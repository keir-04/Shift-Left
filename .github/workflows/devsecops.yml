name: Shift Left Security Gate Pipeline


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main



jobs:


# ============================
# SECRET SECURITY GATE
# ============================

  gitleaks:

    name: Secret Gate - Gitleaks

    runs-on: ubuntu-latest


    steps:


      - name: Checkout Code

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      - name: Run Gitleaks

        uses: gitleaks/gitleaks-action@v2

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}





# ============================
# SAST SECURITY GATE
# ============================


  semgrep:


    name: Code Security Gate - Semgrep


    runs-on: ubuntu-latest



    steps:


      - name: Checkout Code

        uses: actions/checkout@v4



      - name: Install Semgrep

        run: |

          python -m pip install semgrep



      - name: Run Semgrep Security Gate

        run: |

          semgrep scan \
          --config p/security-audit \
          --config p/javascript \
          --error





# ============================
# DEPENDENCY SECURITY GATE
# ============================


  trivy:


    name: Dependency Security Gate - Trivy


    runs-on: ubuntu-latest



    steps:


      - name: Checkout Code

        uses: actions/checkout@v4



      - name: Run Trivy Security Gate


        uses: aquasecurity/trivy-action@master


        with:

          scan-type: fs

          scan-ref: .

          severity: HIGH,CRITICAL

          ignore-unfixed: true

          exit-code: 1


# ============================
# CONTAINER SECURITY GATE
# ============================


  container-security:


    name: Container Security Gate - Trivy


    runs-on: ubuntu-latest



    steps:


      - name: Checkout Code

        uses: actions/checkout@v4



      - name: Build Docker Image

        run: |

          docker build -t shift-left-app .



      - name: Scan Docker Image

        uses: aquasecurity/trivy-action@master


        with:

          image-ref: shift-left-app

          severity: HIGH,CRITICAL

          exit-code: 1

          ignore-unfixed: true
